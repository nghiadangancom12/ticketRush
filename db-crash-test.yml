config:
  target: "http://localhost:3000"
  phases:
    - duration: 20       # Chạy trong 20 giây
      arrivalRate: 10    # Chỉ 10 người mỗi giây (Tổng 200 người)
scenarios:
  - name: "Tranh ghế VIP"
    flow:
      - post:
          url: "/api/Booking/hold"
          json:
            eventId: "EVENT_123"
            userId: "user_test_loop" # Tạm thời dùng ID cố định cũng được
            seatIds: ["SEAT_001", "SEAT_002"]