  /api/orders:
    get:
      tags: [Orders]
      summary: Lấy danh sách đơn hàng (Admin only)
      description: |
        Trả về danh sách đơn hàng kèm thông tin người mua, vé, ghế và sự kiện.
        Hỗ trợ lọc theo nhiều tiêu chí kết hợp.

        ### 🔍 Filter
        | Query param | Ý nghĩa | Ví dụ |
        |---|---|---|
        | `eventId` | Lọc theo sự kiện | `?eventId=abc-123` |
        | `user_id` | Lọc theo người mua | `?user_id=xyz-456` |
        | `status` | Lọc theo trạng thái | `?status=PAID` |
        | `created_at[gte]` | Từ ngày tạo | `?created_at[gte]=2025-01-01` |
        | `created_at[lte]` | Đến ngày tạo | `?created_at[lte]=2025-12-31` |

        ### 🔃 Sort
        `?sort=created_at:desc` hoặc `?sort=total_amount:asc`

        ### 📄 Pagination
        `?page=1&limit=20` (mặc định: page=1, limit=100)

        ### Ví dụ thực tế
        ```
        GET /api/orders?eventId=abc&status=PAID&sort=created_at:desc&page=1&limit=10
        GET /api/orders?user_id=xyz&created_at[gte]=2025-01-01
        ```
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: eventId
          in: query
          schema:
            type: string
            format: uuid
          description: Lọc theo ID sự kiện
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
          description: Lọc theo ID người mua
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, CANCELLED]
          description: Lọc theo trạng thái đơn hàng
        - name: created_at[gte]
          in: query
          schema:
            type: string
            format: date-time
          description: Lọc từ ngày tạo (>=)
        - name: created_at[lte]
          in: query
          schema:
            type: string
            format: date-time
          description: Lọc đến ngày tạo (<=)
        - name: sort
          in: query
          schema:
            type: string
            example: "created_at:desc"
          description: "Sắp xếp theo field. Mặc định: created_at:desc"
        - name: fields
          in: query
          schema:
            type: string
            example: "id,user_id,status,total_amount,created_at"
          description: Chỉ trả về các field được liệt kê
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 100
      responses:
        '200':
          description: Lấy danh sách thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Lấy danh sách đơn hàng thành công"
                  data:
                    type: object
                    properties:
                      results:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 85
                      page:
                        type: integer
                        example: 1
                      totalPages:
                        type: integer
                        example: 9
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            status:
                              type: string
                              enum: [PENDING, PAID, CANCELLED]
                            total_amount:
                              type: number
                              example: 350000
                            created_at:
                              type: string
                              format: date-time
                            users:
                              type: object
                              properties:
                                id:
                                  type: string
                                email:
                                  type: string
                                full_name:
                                  type: string
                            tickets:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  qr_code:
                                    type: string
                                  seats:
                                    type: object
                                    properties:
                                      row_label:
                                        type: string
                                      seat_number:
                                        type: integer
                                      zones:
                                        type: object
                                        properties:
                                          name:
                                            type: string
                                          events:
                                            type: object
                                            properties:
                                              id:
                                                type: string
                                              title:
                                                type: string
                                              start_time:
                                                type: string
                                              location:
                                                type: string
        '401':
          description: Chưa xác thực
        '403':
          description: Chỉ Admin mới có quyền truy cập

