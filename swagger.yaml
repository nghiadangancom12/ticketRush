openapi: 3.0.0
info:
  title: TicketRush API
  description: Hệ thống phân phối vé sự kiện và quản lý đặt chỗ thời gian thực
  version: 1.0.0
  contact:
    name: Support Team
tags:
  - name: Authentication
    description: User registration and login
  - name: Users  
    description: User profile and role management
  - name: Events
    description: Event management
  - name: Seats
    description: Seat reservation and booking
  - name: Booking
    description: Giữ ghế, thanh toán và trả ghế
  - name: Customers
    description: Customer purchase history
  - name: Admin
    description: Admin dashboard and analytics
  - name: Queue
    description: Hàng chờ ảo (Virtual Queue) cho sự kiện
servers:
  - url: http://localhost:3000
    description: Local Development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Sử dụng JWT token từ Authorization header
    
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt
      description: |
        🍪 HttpOnly Cookie Authentication
        
        ✅ Quá trình:
        1. Gọi /api/auth/login để nhận HttpOnly cookie
        2. Cookie tự động được gửi kèm theo mỗi request (nếu credentials được bật)
        3. Các endpoint sẽ xác thực dựa trên cookie JWT này
        
        📌 Lưu ý:
        - HttpOnly Cookie không thể truy cập từ JavaScript (XSS protection)
        - Browser sẽ tự động gửi cookie giữa các request cùng origin
        - Khi test cross-domain, cần bật CORS credentials
        
        🔒 Security attributes:
        - HttpOnly: true (chống XSS)
        - Secure: true (chỉ qua HTTPS)
        - SameSite: None (cho phép cross-domain)

paths:
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Đăng ký tài khoản mới
      description: Tạo tài khoản mới với vai trò mặc định là CUSTOMER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - passwordConfirm
                - full_name
              properties:
                email:
                  type: string
                  format: email
                  example: "nghia@example.com"
                password:
                  type: string
                  minLength: 6
                  example: "password123"
                passwordConfirm:
                  type: string
                  example: "password123"
                full_name:
                  type: string
                  example: "Nguyễn Đỗ Trọng Nghĩa"
                date_of_birth:
                  type: string
                  description: "Định dạng YYYY-MM-DD"
                  example: "2005-01-01"
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
      responses:
        '201':
          description: Đăng ký thành công
        '400':
          description: Lỗi dữ liệu đầu vào (Zod) hoặc Email đã tồn tại

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Đăng nhập
      description: |
        Đăng nhập và nhận JWT token qua HttpOnly Cookie.
        
        🔐 Cookie sẽ được tự động gửi:
        - HttpOnly: Không thể truy cập từ JavaScript
        - Secure: Chỉ qua HTTPS
        - SameSite: None (cho phép cross-domain)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "nghia@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Đăng nhập thành công và nhận HttpOnly Cookie
          headers:
            Set-Cookie:
              schema:
                type: string
                example: jwt=eyJhbGc...; HttpOnly; Secure; SameSite=None; Path=/; Max-Age=86400
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Đăng nhập thành công"
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                      accessToken:
                        type: string
        '401':
          description: Sai email hoặc mật khẩu
        '400':
          description: Lỗi định dạng dữ liệu gửi lên

  /api/auth/logout:
    get:
      tags: [Authentication]
      summary: Đăng xuất
      description: |
        Đăng xuất và xóa HttpOnly Cookie
        
        ✅ Cookie sẽ bị xóa (hết hạn ngay lập tức)
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Đăng xuất thành công
          headers:
            Set-Cookie:
              schema:
                type: string
                example: jwt=loggedout; HttpOnly; Secure; SameSite=None; Path=/; Max-Age=10

  /api/auth/forgotPassword:
    post:
      tags: [Authentication]
      summary: Quên mật khẩu
      description: Gửi email chứa token và link để đặt lại mật khẩu (Token có hạn 10 phút)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "nghia@example.com"
      responses:
        '200':
          description: Token đã được gửi vào email
        '404':
          description: Không tìm thấy người dùng với email này

  /api/auth/resetPassword/{token}:
    patch:
      tags: [Authentication]
      summary: Đặt lại mật khẩu
      description: Đặt lại mật khẩu mới dựa trên token lấy từ email
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Mã token nhận được từ email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - passwordConfirm
              properties:
                password:
                  type: string
                  minLength: 6
                  example: "newpassword123"
                passwordConfirm:
                  type: string
                  example: "newpassword123"
      responses:
        '200':
          description: Đặt lại mật khẩu thành công và tự động đăng nhập (nhận token mới)
        '400':
          description: Mật khẩu xác nhận không khớp hoặc token không hợp lệ / đã hết hạn
  /api/users/me:
    get:
      tags: [Users]
      summary: Lấy profile người dùng hiện tại
      description: |
        ✅ Xác thực bằng HttpOnly Cookie hoặc Bearer Token
        
        Các cách gửi token:
        1. 🍪 HttpOnly Cookie: Tự động được gửi kèm request
        2. 🔐 Bearer Token: Gửi qua Authorization header
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Lấy profile thành công
    patch:
      tags: [Users]
      summary: Cập nhật profile
      description: Cập nhật avatar, họ tên, ngày sinh, giới tính (xác thực bằng Cookie/Bearer token)
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                avatar_url:
                  type: string
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
      responses:
        '200':
          description: Cập nhật thành công

  /api/users/{userId}/grant-admin:
    patch:
      tags: [Users]
      summary: Cấp quyền admin (Admin only)
      description: Chỉ admin mới có thể cấp quyền admin cho người khác
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cấp quyền thành công
        '403':
          description: Chỉ admin mới có thể cấp quyền

  /api/users/{userId}/revoke-admin:
    patch:
      tags: [Users]
      summary: Hủy quyền admin (Admin only)
      description: Hạ cấp người dùng từ admin xuống customer
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hủy quyền thành công
        '403':
          description: Chỉ admin mới có thể hủy quyền

  /api/events:
    get:
      tags: [Events]
      summary: Lấy danh sách tất cả sự kiện
      responses:
        '200':
          description: Lấy danh sách thành công
    post:
      tags: [Events]
      summary: Tạo sự kiện mới (Admin only)
      description: Tạo sự kiện với các khu vực (zone) và chỗ ngồi
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - start_time
                - location
                - zones
              properties:
                title:
                  type: string
                description:
                  type: string
                start_time:
                  type: string
                  format: date-time
                location:
                  type: string
                zones:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: Tạo sự kiện thành công
        '403':
          description: Chỉ admin mới có thể tạo sự kiện

  /api/events/{id}:
    get:
      tags: [Events]
      summary: Lấy chi tiết sự kiện
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lấy thành công
        '404':
          description: Sự kiện không tồn tại

  /api/events/{id}/image:
    patch:
      tags: [Events]
      summary: Cập nhật hình ảnh sự kiện (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - image_url
              properties:
                image_url:
                  type: string
      responses:
        '200':
          description: Cập nhật ảnh thành công
        '403':
          description: Chỉ admin mới có thể cập nhật ảnh

  /api/Booking/hold:
    post:
      tags: [Booking]
      summary: Giữ ghế để đặt hàng
      description: Giữ ghế trong 1 phút để hoàn tất thanh toán
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - seatIds
              properties:
                eventId:
                  type: string
                seatIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Giữ ghế thành công
        '412':
          description: Một số ghế không còn trống

  /api/Booking/checkout:
    post:
      tags: [Booking]
      summary: Hoàn tất thanh toán
      description: Xác nhận mua các ghế đã giữ và tạo đơn hàng
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
              properties:
                eventId:
                  type: string
      responses:
        '201':
          description: Thanh toán thành công

  /api/customers/purchaseHistory:
    get:
      tags: [Customers]
      summary: Lấy lịch sử mua hàng
      description: Xem tất cả các đơn hàng và vé đã mua
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lấy lịch sử thành công

  /api/admin/dashboard:
    get:
      tags: [Admin]
      summary: Thống kê admin (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lấy thống kê thành công
        '403':
          description: Chỉ admin mới có thể xem

  /api/admin/customer-analytics:
    get:
      tags: [Admin]
      summary: Phân tích khách hàng (Admin only)
      description: Thống kê chi tiêu và hành vi khách hàng
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lấy phân tích thành công
        '403':
          description: Chỉ admin mới có thể xem

  /api/queue/{eventId}/join:
    post:
      tags: [Queue]
      summary: Tham gia hoặc kiểm tra vị trí hàng chờ
      description: Bắt đầu xếp hàng vào sự kiện hoặc dùng để polling mỗi 5 giây cập nhật vị trí.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
          description: ID sự kiện
      responses:
        '200':
          description: Đã được cấp quyền truy cập vào mua vé (Status allowed).
        '202':
          description: Đang xếp hàng. Trả về vị trí hiện tại.

  /api/queue/{eventId}/leave:
    delete:
      tags: [Queue]
      summary: Rời khỏi hàng chờ
      description: Người dùng chủ động rời khỏi hàng chờ hoặc từ bỏ lượt mua vé để nhường chỗ (slot) cho người khác.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
          description: ID sự kiện
      responses:
        '200':
          description: Đã rời khỏi hàng chờ thành công.

  /api/queue/admin/{eventId}/toggle:
    post:
      tags: [Queue]
      summary: Bật/Tắt Hàng chờ cho sự kiện (Admin only)
      description: Bật (true) để buộc người dùng phải xếp hàng ảo, tắt (false) để cho phép mua vé tự do không cần xếp hàng.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
          description: ID sự kiện
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Cập nhật cấu hình queue thành công

  /api/Booking/return:
    post:
      tags: [Booking]
      summary: Trả ghế và giải phóng slot hàng chờ
      description: |
        Nhả toàn bộ ghế đang ở trạng thái `LOCKED` về `AVAILABLE` và giải phóng
        slot trong Virtual Queue để người tiếp theo được vào.

        ### Khi nào gọi API này?
        Gọi API này khi **người dùng chủ động hủy** quá trình đặt vé, ví dụ:
        - Bấm nút "← Huỷ & Quay Lại Chọn Ghế" trên trang Checkout.
        - Bấm nút "Huỷ" / "Quay lại" ở bất kỳ bước nào trước khi thanh toán xong.

        ### Lưu ý quan trọng cho Frontend
        > ⚠️ **KHÔNG** gọi API này khi điều hướng từ trang EventDetail sang trang Checkout.
        > Khi user bấm "Giữ Chỗ & Thanh Toán", frontend cần dùng một **flag nội bộ**
        > (ví dụ: `isNavigatingToCheckout = true`) để tránh hàm cleanup của component
        > gọi `/return` nhầm trong lúc React unmount component.

        ### Kết quả
        - Ghế về `AVAILABLE`, hiển thị lại trên sơ đồ ghế cho người khác.
        - Slot hàng chờ (queue slot) được giải phóng → Worker sẽ kéo người tiếp theo vào.
        - Frontend nên điều hướng về `/event/:id/queue` sau khi gọi thành công.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
              properties:
                eventId:
                  type: string
                  example: "a1b2c3d4-0000-0000-0000-000000000001"
                  description: ID sự kiện chứa các ghế cần trả
      responses:
        '200':
          description: Trả ghế thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Đã trả 2 ghế thành công."
                  data:
                    type: object
                    properties:
                      releasedCount:
                        type: integer
                        example: 2
                        description: Số ghế đã được nhả về AVAILABLE
        '401':
          description: Chưa đăng nhập (token không hợp lệ hoặc thiếu)

  /api/queue/{eventId}/heartbeat:
    post:
      tags: [Queue]
      summary: Gia hạn phiên hoạt động trong Virtual Queue
      description: |
        Gia hạn thẻ bài (session) trong Redis thêm **20 giây** mỗi lần ping,
        giữ cho người dùng không bị đuổi ra khỏi phòng mua vé vì hết thời gian chờ.

        ---

        ## 📘 Hướng dẫn tích hợp cho Frontend

        ### Nguyên lý hoạt động
        Sau khi được phép vào phòng mua vé (`status: allowed`), Redis cấp một
        "thẻ bài" với TTL = **20 giây**. Nếu Frontend không ping lại trước khi thẻ hết hạn,
        người dùng sẽ bị tự động đuổi ra và slot nhường cho người tiếp theo.

        ### Quy tắc ping
        | Trang đang ở               | Có nên ping? | Interval khuyến nghị |
        |----------------------------|:------------:|----------------------|
        | `/event/:id` (chọn ghế)   | ✅ Bắt buộc  | mỗi **15 giây**      |
        | `/checkout` (thanh toán)  | ✅ Bắt buộc  | mỗi **12 giây**      |
        | `/event/:id/queue` (chờ)  | ❌ Không cần | —                    |

        ### Cách triển khai (React)
        ```javascript
        // Đặt trong useEffect của trang EventDetail VÀ CheckoutPage
        const heartbeatRef = useRef(null);

        useEffect(() => {
          if (!eventId || !token) return;

          const ping = async () => {
            try {
              await axios.post(
                `/api/queue/${eventId}/heartbeat`,
                {},
                { headers: { Authorization: `Bearer ${token}` } }
              );
            } catch (err) {
              if (err.response?.status === 410) {
                // Session hết hạn hoàn toàn → đuổi về hàng chờ
                clearInterval(heartbeatRef.current);
                navigate(`/event/${eventId}/queue`);
              }
              // Lỗi mạng tạm thời (5xx, network error) → bỏ qua, thử lại lần sau
            }
          };

          ping(); // Ping ngay khi mount để gia hạn tức thì
          heartbeatRef.current = setInterval(ping, 12000); // 12s cho checkout, 15s cho chọn ghế

          return () => clearInterval(heartbeatRef.current); // Dọn dẹp khi unmount
        }, [eventId, token]);
        ```

        ### Xử lý phản hồi từ server
        | HTTP Status | Ý nghĩa                                               | Hành động Frontend               |
        |-------------|-------------------------------------------------------|----------------------------------|
        | `200 OK`    | Ping thành công, session được gia hạn thêm 20s        | Không làm gì, tiếp tục polling   |
        | `410 Gone`  | Session đã hết hạn (mất kết nối quá lâu hoặc timeout 10 phút) | Dừng interval, điều hướng về `/event/:id/queue` |
        | `401`       | Token không hợp lệ                                    | Điều hướng về `/auth`            |

        ### Hard Timeout (10 phút)
        Ngoài TTL 20s, mỗi session có giới hạn tuyệt đối là **10 phút** tính từ lúc được cấp.
        Ngay cả khi ping đều đặn, sau 10 phút session sẽ bị thu hồi (`reason: TIMEOUT`).
        Response body sẽ có thêm trường `hardTimeoutLeft` (milliseconds còn lại) để Frontend
        hiển thị đồng hồ đếm ngược cho người dùng.

      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
          description: ID sự kiện mà user đang giữ slot
      responses:
        '200':
          description: Session được gia hạn thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Phiên hoạt động đã được gia hạn."
                  data:
                    type: object
                    properties:
                      alive:
                        type: boolean
                        example: true
                      expiresAt:
                        type: integer
                        example: 1745425210000
                        description: Unix timestamp (ms) khi thẻ bài hết hạn (20s kể từ lúc ping)
                      hardTimeoutLeft:
                        type: integer
                        example: 487000
                        description: |
                          Số milliseconds còn lại của giới hạn 10 phút tuyệt đối.
                          Frontend dùng để hiển thị đồng hồ đếm ngược.
                          Ví dụ: 487000ms ≈ 8 phút 7 giây còn lại.
        '410':
          description: |
            Session đã hết hạn — người dùng bị đuổi ra khỏi phòng.

            **Frontend phải:** Dừng interval heartbeat và điều hướng về `/event/:id/queue`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "fail"
                  reason:
                    type: string
                    enum: [DISCONNECTED, TIMEOUT]
                    description: |
                      - `DISCONNECTED`: Mất kết nối quá 20 giây (không ping kịp thời)
                      - `TIMEOUT`: Đã hết 10 phút giới hạn tuyệt đối
                  message:
                    type: string
                    example: "Phiên giao dịch mất kết nối quá lâu. Vui lòng quay lại hàng chờ."
        '401':
          description: Token không hợp lệ hoặc thiếu