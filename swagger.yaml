        ### Khi nào gọi API này?
        Gọi API này khi **người dùng chủ động hủy** quá trình đặt vé, ví dụ:
        - Bấm nút "← Huỷ & Quay Lại Chọn Ghế" trên trang Checkout.
        - Bấm nút "Huỷ" / "Quay lại" ở bất kỳ bước nào trước khi thanh toán xong.

        ### Kết quả
        - Ghế về `AVAILABLE`, hiển thị lại trên sơ đồ ghế cho người khác.
        - Slot hàng chờ (queue slot) được giải phóng → Worker sẽ kéo người tiếp theo vào.
        - Frontend nên điều hướng về `/event/:id/queue` sau khi gọi thành công.
