openapi: 3.0.0
info:
  title: TicketRush API
  description: Hệ thống phân phối vé sự kiện và quản lý đặt chỗ thời gian thực
  version: 1.0.0
  contact:
    name: Support Team
tags:
  - name: Authentication
    description: User registration and login
  - name: Users  
    description: User profile and role management
  - name: Events
    description: Event management
  - name: Seats
    description: Seat reservation and booking
  - name: Booking
    description: Giữ ghế, thanh toán và trả ghế
  - name: Orders
    description: Quản lý đơn hàng (Admin)
  - name: Customers
    description: Customer purchase history
  - name: Admin
    description: Admin dashboard and analytics
  - name: Queue
    description: Hàng chờ ảo (Virtual Queue) cho sự kiện
servers:
  - url: http://localhost:3000
    description: Local Development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Sử dụng JWT token từ Authorization header
    
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt
      description: |
        🍪 HttpOnly Cookie Authentication
        
        ✅ Quá trình:
        1. Gọi /api/auth/login để nhận HttpOnly cookie
        2. Cookie tự động được gửi kèm theo mỗi request (nếu credentials được bật)
        3. Các endpoint sẽ xác thực dựa trên cookie JWT này
        
        📌 Lưu ý:
        - HttpOnly Cookie không thể truy cập từ JavaScript (XSS protection)
        - Browser sẽ tự động gửi cookie giữa các request cùng origin
        - Khi test cross-domain, cần bật CORS credentials
        
        🔒 Security attributes:
        - HttpOnly: true (chống XSS)
        - Secure: true (chỉ qua HTTPS)
        - SameSite: None (cho phép cross-domain)

paths:
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Đăng ký tài khoản mới
      description: Tạo tài khoản mới với vai trò mặc định là CUSTOMER
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - passwordConfirm
                - full_name
              properties:
                email:
                  type: string
                  format: email
                  example: "nghia@example.com"
                password:
                  type: string
                  minLength: 6
                  example: "password123"
                passwordConfirm:
                  type: string
                  example: "password123"
                full_name:
                  type: string
                  example: "Nguyễn Đỗ Trọng Nghĩa"
                date_of_birth:
                  type: string
                  description: "Định dạng YYYY-MM-DD"
                  example: "2005-01-01"
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
      responses:
        '201':
          description: Đăng ký thành công
        '400':
          description: Lỗi dữ liệu đầu vào (Zod) hoặc Email đã tồn tại

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Đăng nhập
      description: |
        Đăng nhập và nhận JWT token qua HttpOnly Cookie.
        
        🔐 Cookie sẽ được tự động gửi:
        - HttpOnly: Không thể truy cập từ JavaScript
        - Secure: Chỉ qua HTTPS
        - SameSite: None (cho phép cross-domain)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "nghia@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Đăng nhập thành công và nhận HttpOnly Cookie
          headers:
            Set-Cookie:
              schema:
                type: string
                example: jwt=eyJhbGc...; HttpOnly; Secure; SameSite=None; Path=/; Max-Age=86400
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Đăng nhập thành công"
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                      accessToken:
                        type: string
        '401':
          description: Sai email hoặc mật khẩu
        '400':
          description: Lỗi định dạng dữ liệu gửi lên

  /api/auth/logout:
    get:
      tags: [Authentication]
      summary: Đăng xuất
      description: |
        Đăng xuất và xóa HttpOnly Cookie
        
        ✅ Cookie sẽ bị xóa (hết hạn ngay lập tức)
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Đăng xuất thành công
          headers:
            Set-Cookie:
              schema:
                type: string
                example: jwt=loggedout; HttpOnly; Secure; SameSite=None; Path=/; Max-Age=10

  /api/auth/forgotPassword:
    post:
      tags: [Authentication]
      summary: Quên mật khẩu
      description: Gửi email chứa token và link để đặt lại mật khẩu (Token có hạn 10 phút)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "nghia@example.com"
      responses:
        '200':
          description: Token đã được gửi vào email
        '404':
          description: Không tìm thấy người dùng với email này

  /api/auth/resetPassword/{token}:
    patch:
      tags: [Authentication]
      summary: Đặt lại mật khẩu
      description: Đặt lại mật khẩu mới dựa trên token lấy từ email
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Mã token nhận được từ email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - passwordConfirm
              properties:
                password:
                  type: string
                  minLength: 6
                  example: "newpassword123"
                passwordConfirm:
                  type: string
                  example: "newpassword123"
      responses:
        '200':
          description: Đặt lại mật khẩu thành công và tự động đăng nhập (nhận token mới)
        '400':
          description: Mật khẩu xác nhận không khớp hoặc token không hợp lệ / đã hết hạn
  /api/users:
    get:
      tags: [Users]
      summary: Lấy danh sách tất cả người dùng (Admin only)
      description: |
        Trả về danh sách người dùng với đầy đủ tính năng lọc, sắp xếp,
        chọn trường và phân trang nhờ `PrismaApiFeatures`.

        ### 🔍 Filter
        - Lọc theo giá trị cụ thể: `?role=ADMIN`
        - Lọc theo khoảng (comparison operators):
          - `?created_at[gte]=2025-01-01` → `created_at >= '2025-01-01'`
          - `?created_at[lte]=2025-12-31` → `created_at <= '2025-12-31'`
          - Hỗ trợ: `gte`, `gt`, `lte`, `lt`, `equals`, `not`, `contains`, `startsWith`, `endsWith`

        ### 🔃 Sort
        - `?sort=created_at:desc` → sắp xếp theo created_at giảm dần
        - `?sort=role:asc,full_name:desc` → sắp xếp nhiều field
        - Mặc định: `created_at:desc`

        ### 📐 Field Selection
        - `?fields=id,email,role,full_name` → chỉ trả về các field được chỉ định

        ### 📄 Pagination
        - `?page=2&limit=20` → trang 2, mỗi trang 20 bản ghi
        - Mặc định: `page=1`, `limit=100`

        ### Ví dụ thực tế
        ```
        GET /api/users?role=CUSTOMER&sort=created_at:desc&fields=id,email,role&page=1&limit=20
        GET /api/users?created_at[gte]=2025-01-01&sort=full_name:asc
        ```
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [ADMIN, CUSTOMER]
          description: Lọc theo role
        - name: created_at[gte]
          in: query
          schema:
            type: string
            format: date-time
          description: Lọc từ ngày tạo (>=)
        - name: created_at[lte]
          in: query
          schema:
            type: string
            format: date-time
          description: Lọc đến ngày tạo (<=)
        - name: sort
          in: query
          schema:
            type: string
            example: "created_at:desc,full_name:asc"
          description: "Sắp xếp theo field, phân cách bởi dấu phẩy. Mặc định: created_at:desc"
        - name: fields
          in: query
          schema:
            type: string
            example: "id,email,full_name,role"
          description: Chỉ trả về các field được liệt kê
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Số trang (mặc định 1)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 100
          description: Số bản ghi mỗi trang (mặc định 100)
      responses:
        '200':
          description: Lấy danh sách thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Lấy danh sách người dùng thành công"
                  data:
                    type: object
                    properties:
                      results:
                        type: integer
                        description: Số bản ghi trong trang hiện tại
                        example: 20
                      total:
                        type: integer
                        description: Tổng số bản ghi thỏa điều kiện lọc
                        example: 143
                      page:
                        type: integer
                        example: 1
                      totalPages:
                        type: integer
                        example: 8
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            email:
                              type: string
                            full_name:
                              type: string
                            role:
                              type: string
                              enum: [ADMIN, CUSTOMER]
                            created_at:
                              type: string
                              format: date-time
        '401':
          description: Chưa xác thực
        '403':
          description: Chỉ Admin mới có quyền truy cập

  /api/users/me:

    get:
      tags: [Users]
      summary: Lấy profile người dùng hiện tại
      description: |
        ✅ Xác thực bằng HttpOnly Cookie hoặc Bearer Token
        
        Các cách gửi token:
        1. 🍪 HttpOnly Cookie: Tự động được gửi kèm request
        2. 🔐 Bearer Token: Gửi qua Authorization header
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Lấy profile thành công
    patch:
      tags: [Users]
      summary: Cập nhật profile
      description: Cập nhật avatar, họ tên, ngày sinh, giới tính (xác thực bằng Cookie/Bearer token)
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                avatar_url:
                  type: string
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                gender:
                  type: string
                  enum: [MALE, FEMALE, OTHER]
      responses:
        '200':
          description: Cập nhật thành công

  /api/users/me/avatar:
    patch:
      tags: [Users]
      summary: Upload / cập nhật ảnh đại diện (avatar)
      description: |
        Upload ảnh đại diện mới cho tài khoản đang đăng nhập. Server sẽ tự động:
        - Resize về **400×400px** (vuông, crop center)
        - Compress và convert sang **WebP**
        - Lưu vào `public/img/avatars/` trên server
        - Xóa avatar cũ (nếu có) sau khi cập nhật thành công

        ### ⚠️ Lưu ý quan trọng
        - Request phải dùng `Content-Type: multipart/form-data`
        - Tên field chứa file ảnh phải là **`image`**
        - Chỉ chấp nhận: `image/jpeg`, `image/png`, `image/webp`
        - Giới hạn kích thước: **5MB**

        ### 📎 Ví dụ cURL
        ```bash
        curl -X PATCH http://localhost:3000/api/users/me/avatar \
          -H "Authorization: Bearer <token>" \
          -F "image=@/path/to/avatar.jpg"
        ```
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: "File ảnh avatar (JPEG / PNG / WebP, tối đa 5MB)"
      responses:
        '200':
          description: Upload và cập nhật avatar thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Ảnh đại diện đã được cập nhật!"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                        example: "user@example.com"
                      full_name:
                        type: string
                        example: "Nguyễn Văn A"
                      avatar_url:
                        type: string
                        example: "/img/avatars/avatars-1746374890456-123456789.webp"
                        description: Đường dẫn tương đối để truy cập avatar qua HTTP
        '400':
          description: Không có file ảnh, định dạng không hợp lệ, hoặc file vượt quá 5MB
        '401':
          description: Chưa xác thực

  /api/users/{userId}/grant-admin:
    patch:
      tags: [Users]
      summary: Cấp quyền admin (Admin only)
      description: Chỉ admin mới có thể cấp quyền admin cho người khác
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cấp quyền thành công
        '403':
          description: Chỉ admin mới có thể cấp quyền

  /api/users/{userId}/revoke-admin:
    patch:
      tags: [Users]
      summary: Hủy quyền admin (Admin only)
      description: Hạ cấp người dùng từ admin xuống customer
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hủy quyền thành công
        '403':
          description: Chỉ admin mới có thể hủy quyền

  /api/users/{userId}:
    delete:
      tags: [Users]
      summary: Xóa mềm người dùng (Admin only)
      description: |
        Đánh dấu tài khoản người dùng là đã xóa bằng cách set `deleted_at = now()`.
        Dữ liệu **không** bị xóa khỏi database.
        Sau khi xóa mềm, tài khoản sẽ bị ẩn khỏi tất cả các query tìm kiếm (Global Filter).
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID của người dùng cần xóa
      responses:
        '204':
          description: Xóa mềm thành công (No Content)
        '400':
          description: User đã bị xóa trước đó
        '401':
          description: Chưa xác thực
        '403':
          description: Chỉ Admin mới có quyền thực hiện thao tác này
        '404':
          description: Không tìm thấy người dùng

  /api/events:
    get:
      tags: [Events]
      summary: Lấy danh sách tất cả sự kiện
      responses:
        '200':
          description: Lấy danh sách thành công
    post:
      tags: [Events]
      summary: Tạo sự kiện mới (Admin only)
      description: Tạo sự kiện với các khu vực (zone) và chỗ ngồi
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - start_time
                - location
                - zones
              properties:
                title:
                  type: string
                description:
                  type: string
                start_time:
                  type: string
                  format: date-time
                location:
                  type: string
                zones:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: Tạo sự kiện thành công
        '403':
          description: Chỉ admin mới có thể tạo sự kiện

  /api/events/{id}:
    get:
      tags: [Events]
      summary: Lấy chi tiết sự kiện
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lấy thành công
        '404':
          description: Sự kiện không tồn tại
    delete:
      tags: [Events]
      summary: Xóa mềm sự kiện (Admin only)
      description: |
        Cập nhật `status` của sự kiện thành `DELETED` thay vì xóa hàng thật khỏi database.
        Sau khi xóa mềm, sự kiện sẽ bị ẩn khỏi tất cả các query tìm kiếm (Global Filter).
        Các dữ liệu liên quan (zones, seats, tickets) vẫn được giữ nguyên để phục vụ audit.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID của sự kiện cần xóa
      responses:
        '204':
          description: Xóa mềm thành công (No Content)
        '400':
          description: Sự kiện đã bị xóa trước đó
        '401':
          description: Chưa xác thực
        '403':
          description: Chỉ Admin mới có quyền thực hiện thao tác này
        '404':
          description: Sự kiện không tồn tại

  /api/events/{id}/image:
    patch:
      tags: [Events]
      summary: Upload / cập nhật hình ảnh sự kiện (Admin only)
      description: |
        Upload file ảnh cho sự kiện. Server sẽ tự động:
        - Resize về **1200×630px** (tỉ lệ OG Image chuẩn)
        - Compress và convert sang **WebP** để tối ưu dung lượng
        - Lưu vào `public/img/events/` trên server
        - Xóa ảnh cũ (nếu có) sau khi cập nhật thành công

        ### ⚠️ Lưu ý quan trọng
        - Request phải dùng `Content-Type: multipart/form-data`
        - Tên field chứa file ảnh phải là **`image`**
        - Chỉ chấp nhận: `image/jpeg`, `image/png`, `image/webp`
        - Giới hạn kích thước: **5MB**
        
        ### 📎 Ví dụ cURL
        ```bash
        curl -X PATCH http://localhost:3000/api/events/{id}/image \
          -H "Authorization: Bearer <token>" \
          -F "image=@/path/to/photo.jpg"
        ```
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID của sự kiện cần cập nhật ảnh
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: "File ảnh cần upload (JPEG / PNG / WebP, tối đa 5MB)"
      responses:
        '200':
          description: Upload và cập nhật ảnh thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Hình ảnh sự kiện đã được cập nhật!"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      image_url:
                        type: string
                        example: "/img/events/events-1746374890123-987654321.webp"
                        description: Đường dẫn tương đối để truy cập ảnh qua HTTP
        '400':
          description: Không có file ảnh, định dạng không hợp lệ, hoặc file vượt quá 5MB
        '401':
          description: Chưa xác thực
        '403':
          description: Chỉ Admin mới có quyền cập nhật ảnh
        '404':
          description: Sự kiện không tồn tại

  /api/Booking/hold:
    post:
      tags: [Booking]
      summary: Giữ ghế để đặt hàng
      description: Giữ ghế trong 1 phút để hoàn tất thanh toán
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - seatIds
              properties:
                eventId:
                  type: string
                seatIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Giữ ghế thành công
        '412':
          description: Một số ghế không còn trống

  /api/Booking/checkout:
    post:
      tags: [Booking]
      summary: Hoàn tất thanh toán
      description: Xác nhận mua các ghế đã giữ và tạo đơn hàng
