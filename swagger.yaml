          description: Lấy thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      title:
                        type: string
                      description:
                        type: string
                      start_time:
                        type: string
                        format: date-time
                      location:
                        type: string
                      image_url:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum: [DRAFT, PUBLISHED, CLOSED]
                      category_id:
                        type: string
                        format: uuid
                        nullable: true
                      zones:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            name:
                              type: string
                            price:
                              type: number
                            seats:
                              type: array
                              items:
                                type: object
                                properties:
