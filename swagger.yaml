  /api/Booking/return:
    post:
      tags: [Booking]
      summary: Trả ghế và giải phóng slot hàng chờ
      description: |
        Nhả toàn bộ ghế đang ở trạng thái `LOCKED` về `AVAILABLE` và giải phóng
        slot trong Virtual Queue để người tiếp theo được vào.

        ### Khi nào gọi API này?
        Gọi API này khi **người dùng chủ động hủy** quá trình đặt vé, ví dụ:
        - Bấm nút "← Huỷ & Quay Lại Chọn Ghế" trên trang Checkout.
        - Bấm nút "Huỷ" / "Quay lại" ở bất kỳ bước nào trước khi thanh toán xong.

        ### Lưu ý quan trọng cho Frontend
        > ⚠️ **KHÔNG** gọi API này khi điều hướng từ trang EventDetail sang trang Checkout.
        > Khi user bấm "Giữ Chỗ & Thanh Toán", frontend cần dùng một **flag nội bộ**
        > (ví dụ: `isNavigatingToCheckout = true`) để tránh hàm cleanup của component
        > gọi `/return` nhầm trong lúc React unmount component.

        ### Kết quả
        - Ghế về `AVAILABLE`, hiển thị lại trên sơ đồ ghế cho người khác.
        - Slot hàng chờ (queue slot) được giải phóng → Worker sẽ kéo người tiếp theo vào.
        - Frontend nên điều hướng về `/event/:id/queue` sau khi gọi thành công.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
