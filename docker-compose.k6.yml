version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ticketrush-postgres-k6
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticketrush
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ticketrush"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ticketrush-redis-k6
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: ticketrush-api-k6
    restart: unless-stopped
    command: ["node", "server.js"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ticketrush
      REDIS_URL: redis://redis:6379
      NODE_ENV: test
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

